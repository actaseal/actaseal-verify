name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install cryptography pytest
      - name: Run test suite
        run: pytest -q
      - name: Smoke test -- verify committed demo packets
        run: |
          python verify.py demo/demo-packet-unanchored
          python verify.py demo/demo-packet-anchored
